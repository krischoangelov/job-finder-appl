<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('SkillBridge')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

    <section class="hero">

        <div class="hero-overlay">

            <div class="container">

                <div class="hero-content text-center">

                    <h1>Welcome to SkillBridge</h1>

                    <p>
                        Connect with employers, discover opportunities,
                        and build your professional future.
                    </p>

                    <div class="mt-4">

                        <a th:href="@{/login}"
                           class="btn btn-primary btn-lg me-3">

                            Login

                        </a>

                        <a th:href="@{/register}"
                           class="btn btn-success btn-lg">

                            Register

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
