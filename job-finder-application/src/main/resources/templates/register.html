<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Register')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">

    <div class="form-container">

        <h2 class="form-title">
            Create Account
        </h2>

        <form th:action="@{/register}"
              th:object="${userRegisterRequest}"
              method="post">

            <div class="row">

                <div class="col-md-6">

                    <div class="form-group">

                        <label>Username</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{username}">

                        <span class="validation-error"
                              th:errors="*{username}">
                        </span>

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="form-group">

                        <label>Email</label>

                        <input type="email"
                               class="form-control"
                               th:field="*{email}">

                        <span class="validation-error"
                              th:errors="*{email}">
                        </span>

                    </div>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6">

                    <div class="form-group">

                        <label>First Name</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{firstName}">

                        <span class="validation-error"
                              th:errors="*{firstName}">
                        </span>

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="form-group">

                        <label>Last Name</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{lastName}">

                        <span class="validation-error"
                              th:errors="*{lastName}">
                        </span>

                    </div>

                </div>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input type="password"
                       class="form-control"
                       th:field="*{password}">

                <span class="validation-error"
                      th:errors="*{password}">
                </span>

            </div>

            <div class="form-group">

                <label>Confirm Password</label>

                <input type="password"
                       class="form-control"
                       th:field="*{confirmPassword}">

                <span class="validation-error"
                      th:errors="*{confirmPassword}">
                </span>

            </div>

            <div class="form-group">

                <label>Role</label>

                <select class="form-control"
                        th:field="*{role}">

                    <option value="">
                        Select Role
                    </option>

                    <option value="CANDIDATE">
                        Candidate
                    </option>

                    <option value="RECRUITER">
                        Recruiter
                    </option>

                </select>

                <span class="validation-error"
                      th:errors="*{role}">
                </span>

            </div>

            <button type="submit"
                    class="btn btn-primary mt-3">

                Register

            </button>

        </form>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
