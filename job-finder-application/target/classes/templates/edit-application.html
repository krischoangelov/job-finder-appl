<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Edit Application')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">

    <div class="form-container">

        <h2 class="form-title">
            Edit Motivation Letter
        </h2>

        <form method="post"
              th:object="${applicationDTO}"
              th:action="@{/applications/{id}/edit(id=${applicationId})}">

            <div class="form-group">

                <label>Motivation Letter</label>

                <textarea class="form-control"
                          th:field="*{motivationLetter}">
                </textarea>

                <span class="validation-error"
                      th:errors="*{motivationLetter}">
                </span>

            </div>

            <button class="btn btn-warning mt-3">
                Update Application
            </button>

        </form>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
