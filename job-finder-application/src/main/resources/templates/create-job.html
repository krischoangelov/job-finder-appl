<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Create Job Offer')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">

    <div class="form-container">

        <h2 class="form-title">
            Create Job Offer
        </h2>

        <form th:action="@{/jobs/create}"
              th:object="${jobOfferDTO}"
              method="post">

            <div class="form-group">
                <label>Title</label>
                <input class="form-control"
                       th:field="*{title}">
                <span class="validation-error"
                      th:errors="*{title}"></span>
            </div>

            <div class="form-group">
                <label>Company</label>
                <input class="form-control"
                       th:field="*{company}">
                <span class="validation-error"
                      th:errors="*{company}"></span>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input class="form-control"
                       th:field="*{location}">
                <span class="validation-error"
                      th:errors="*{location}"></span>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea class="form-control"
                          th:field="*{description}"></textarea>
                <span class="validation-error"
                      th:errors="*{description}"></span>
            </div>

            <div class="form-group">
                <label>Salary</label>
                <input type="number"
                       step="0.01"
                       class="form-control"
                       th:field="*{salary}">
                <span class="validation-error"
                      th:errors="*{salary}"></span>
            </div>

            <div class="form-group">
                <label>Employment Type</label>

                <select class="form-control"
                        th:field="*{employmentType}">

                    <option value="FULL_TIME">Full Time</option>
                    <option value="PART_TIME">Part Time</option>
                    <option value="CONTRACT">Contract</option>
                    <option value="INTERNSHIP">Internship</option>
                    <option value="REMOTE">Remote</option>

                </select>

            </div>

            <div class="form-group">
                <label>Deadline</label>
                <input type="date"
                       class="form-control"
                       th:field="*{deadline}">
                <span class="validation-error"
                      th:errors="*{deadline}"></span>
            </div>

            <button class="btn btn-success mt-3"
                    type="submit">
                Create Job
            </button>

        </form>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
