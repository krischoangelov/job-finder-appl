<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Apply for Job')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">

    <div class="form-container">

        <h2 class="form-title">
            Apply for Job
        </h2>

        <form method="post"
              th:object="${applicationRequest}"
              th:action="@{/applications/create/{jobId}(jobId=${jobId})}">

            <div class="form-group">

                <label>Motivation Letter</label>

                <textarea class="form-control"
                          th:field="*{motivationLetter}">
                </textarea>

                <span class="validation-error"
                      th:errors="*{motivationLetter}">
                </span>

            </div>

            <button class="btn btn-success mt-3"
                    type="submit">
                Submit Application
            </button>

        </form>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
