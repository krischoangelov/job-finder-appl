<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Applications')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <h1 class="mb-4">Applications</h1>

    <div class="table-container">

        <table class="table table-striped">

            <thead>
            <tr>
                <th>Job</th>
                <th>Company</th>
                <th>Status</th>
                <th>Applied On</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="jobApplication : ${applications}">

                <td th:text="${jobApplication.jobOffer.title}"></td>

                <td th:text="${jobApplication.jobOffer.company}"></td>

                <td th:text="${jobApplication.status}"></td>

                <td th:text="${#temporals.format(jobApplication.appliedAt,'dd-MM-yyyy')}"></td>

                <td>

                    <a class="btn btn-primary btn-sm"
                       th:href="@{/applications/{id}(id=${jobApplication.id})}">
                        Details
                    </a>

                    <a class="btn btn-warning btn-sm"
                       th:href="@{/applications/{id}/edit(id=${jobApplication.id})}">
                        Edit
                    </a>

                    <form th:action="@{/applications/{id}/withdraw(id=${jobApplication.id})}"
                          method="post"
                          class="d-inline">

                        <button class="btn btn-danger btn-sm"
                                type="submit">
                            Withdraw
                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
